name: API CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  test_build_push_deploy:
    runs-on: [self-hosted, Linux, ARM64, pv-trainer-api]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install deps + run tests
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
          pytest

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build + Push image (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pv-trainer:api
            ${{ secrets.DOCKERHUB_USERNAME }}/pv-trainer:api-${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
          cache-from: type=local,src=/opt/github-cache/buildkit-pv-trainer-api
          cache-to: type=local,dest=/opt/github-cache/buildkit-pv-trainer-api,mode=max

      - name: Trigger Portainer webhook
        run: |
          curl -fsS -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
          echo "Deploy triggered"